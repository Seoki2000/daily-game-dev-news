name: Daily News Collector

on:
  push:
    branches: [ "master", "main" ]
    paths: # 수집 로직이 바뀔 때만 자동 실행 (문서/CSS/데이터 커밋엔 안 돎 → API 쿼터 절약)
      - 'collector.py'
      - 'requirements.txt'
      - '.github/workflows/update.yml'
  schedule:
    - cron: '0 0 * * *' # Every day at 00:00 UTC (9 AM KST)
  workflow_dispatch: # Allow manual trigger

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Collector Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python collector.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/articles.js
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update daily news data" && git push)
