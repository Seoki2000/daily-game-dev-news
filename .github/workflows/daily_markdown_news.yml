name: Daily Markdown News Curator

on:
  schedule:
    - cron: '0 0 * * *' # 매일 UTC 00:00 (한국 시간 오전 9시)에 실행
  workflow_dispatch: # 수동 실행 허용

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 리포지토리에 커밋/푸시하기 위해 필요

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Curator Script
      env:
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      run: python daily_news_curator.py

    - name: Commit and Push Markdown File
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add *-daily-news.md
        git diff --quiet && git diff --staged --quiet || (git commit -m "Add daily news markdown: $(date +'%Y-%m-%d')" && git push)
